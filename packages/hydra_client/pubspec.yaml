name: hydra_client
description: >-
  Flutter-friendly Dart client for Cardano Hydra (hydra-node 2.x) HTTP + WebSocket
  API: reconnecting sessions, sequence sync, typed models, and a head facade.
version: 1.0.0
repository: https://github.com/dextrlabs-dev/hydra-mobile-sdk
homepage: https://dextrlabs-dev.github.io/hydra-mobile-sdk/
documentation: https://dextrlabs-dev.github.io/hydra-mobile-sdk/
issue_tracker: https://github.com/dextrlabs-dev/hydra-mobile-sdk/issues
topics:
  - cardano
  - hydra
  - layer2
  - payments
  - flutter

platforms:
  android:
  ios:
  linux:
  macos:
  windows:
  web:

environment:
  sdk: ">=3.3.0 <4.0.0"

dependencies:
  http: ^1.2.2
  web_socket_channel: ^3.0.1

dev_dependencies:
  test: ^1.25.8
