name: CI

on:
  push:
    branches: [main, master]
    tags: ['v*']
  pull_request:
    branches: [main, master]

jobs:
  hydra_client:
    name: hydra_client (analyze + test)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: packages/hydra_client
    steps:
      - uses: actions/checkout@v4
      - uses: subosito/flutter-action@v2
        with:
          channel: stable
      - run: dart pub get
      - run: dart analyze
      - name: dart test (machine reporter)
        run: dart test --reporter expanded --file-reporter json:test-report.json
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: hydra_client-test-report
          path: packages/hydra_client/test-report.json

  hydra_demo_test:
    name: hydra_demo (analyze + unit + widget tests)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: example/hydra_demo
    steps:
      - uses: actions/checkout@v4
      - uses: subosito/flutter-action@v2
        with:
          channel: stable
      - run: flutter pub get
      - run: dart analyze lib/
      - name: flutter test (machine reporter + coverage)
        run: |
          set -o pipefail
          flutter test --machine --coverage > test-report.json
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: hydra_demo-test-report
          path: |
            example/hydra_demo/test-report.json
            example/hydra_demo/coverage/lcov.info

  android_build:
    name: hydra_demo (Android APK)
    runs-on: ubuntu-latest
    needs: [hydra_client, hydra_demo_test]
    defaults:
      run:
        working-directory: example/hydra_demo
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'
      - uses: subosito/flutter-action@v2
        with:
          channel: stable
      - run: flutter pub get
      - run: flutter build apk --debug
      - uses: actions/upload-artifact@v4
        with:
          name: hydra-demo-android-debug-apk
          path: example/hydra_demo/build/app/outputs/flutter-apk/app-debug.apk

  ios_build:
    name: hydra_demo (iOS unsigned simulator build)
    runs-on: macos-latest
    needs: [hydra_client, hydra_demo_test]
    defaults:
      run:
        working-directory: example/hydra_demo
    steps:
      - uses: actions/checkout@v4
      - uses: subosito/flutter-action@v2
        with:
          channel: stable
      - run: flutter pub get
      - name: flutter build ios (no codesign, simulator)
        run: flutter build ios --debug --no-codesign --simulator
      - name: package simulator .app
        run: |
          cd build/ios/iphonesimulator
          zip -r hydra_demo-ios-simulator.zip Runner.app
      - uses: actions/upload-artifact@v4
        with:
          name: hydra-demo-ios-simulator-app
          path: example/hydra_demo/build/ios/iphonesimulator/hydra_demo-ios-simulator.zip

  ios_integration:
    name: hydra_demo (iOS simulator launch + screen recording)
    runs-on: macos-latest
    needs: ios_build
    defaults:
      run:
        working-directory: example/hydra_demo
    steps:
      - uses: actions/checkout@v4
      - uses: subosito/flutter-action@v2
        with:
          channel: stable
      - run: flutter pub get
      - name: list available simulators
        run: xcrun simctl list devices available
      - name: boot iPhone simulator
        run: |
          UDID=$(xcrun simctl list devices available | grep -E "iPhone [0-9]+ \(" | head -1 | sed -E 's/.*\(([-0-9A-F]+)\).*/\1/')
          echo "UDID=$UDID" >> "$GITHUB_ENV"
          xcrun simctl boot "$UDID" || true
          xcrun simctl bootstatus "$UDID" -b
      - name: start screen recording
        run: |
          (xcrun simctl io "$UDID" recordVideo --codec h264 --force /tmp/hydra-demo-ios.mp4 &)
          echo $! > /tmp/rec.pid
          sleep 2
      - name: launch demo on simulator
        run: |
          flutter run -d "$UDID" --no-pub --target=lib/main.dart &
          RUN_PID=$!
          sleep 60
          kill $RUN_PID || true
        continue-on-error: true
      - name: stop screen recording
        if: always()
        run: |
          kill -INT "$(cat /tmp/rec.pid)" || true
          sleep 3
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: hydra-demo-ios-screen-recording
          path: /tmp/hydra-demo-ios.mp4

  release:
    name: Publish GitHub Release on tag
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')
    needs: [android_build, ios_build, ios_integration]
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      - uses: actions/download-artifact@v4
        with:
          path: artifacts
      - name: assemble release assets
        run: |
          mkdir -p release
          find artifacts -type f \( -name '*.apk' -o -name '*.zip' -o -name '*.mp4' \) -exec cp {} release/ \;
          ls -la release/
      - uses: softprops/action-gh-release@v2
        with:
          files: release/*
          generate_release_notes: true
          prerelease: ${{ contains(github.ref_name, 'alpha') || contains(github.ref_name, 'beta') || contains(github.ref_name, 'rc') }}
