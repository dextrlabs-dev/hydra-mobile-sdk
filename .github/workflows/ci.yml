name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  hydra_client:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: packages/hydra_client
    steps:
      - uses: actions/checkout@v4
      - uses: subosito/flutter-action@v2
        with:
          channel: stable
      - run: dart pub get
      - run: dart analyze
      - run: dart test

  hydra_demo:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: example/hydra_demo
    steps:
      - uses: actions/checkout@v4
      - uses: subosito/flutter-action@v2
        with:
          channel: stable
      - run: flutter pub get
      - run: dart analyze lib/
      - run: flutter test
