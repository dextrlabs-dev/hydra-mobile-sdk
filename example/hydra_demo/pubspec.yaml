name: hydra_demo
description: Example Flutter app using hydra_client against a local hydra-node.
publish_to: "none"
version: 0.1.0

environment:
  sdk: ">=3.5.0 <4.0.0"
  flutter: ">=3.24.1 <4.0.0"

dependencies:
  flutter:
    sdk: flutter
  hydra_client:
    path: ../../packages/hydra_client
  # 1.x requires Flutter >=3.27.3; stay on 0.5.x / 0.1.x for Flutter 3.24 stable.
  catalyst_cardano_serialization: ^0.5.0+4
  catalyst_key_derivation: ^0.1.3
  cbor: ^6.3.0
  convert: ^3.1.1
  cryptography: ^2.7.0

dev_dependencies:
  flutter_test:
    sdk: flutter

flutter:
  uses-material-design: true
