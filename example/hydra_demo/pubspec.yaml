name: hydra_demo
description: Example Flutter app using hydra_client against a local hydra-node.
publish_to: "none"
version: 0.1.0

environment:
  sdk: ">=3.5.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter
  http: ^1.2.2
  hydra_client:
    path: ../../packages/hydra_client
  catalyst_cardano_serialization: ^1.0.0
  catalyst_key_derivation: ^1.0.0
  cbor: ^6.3.0
  convert: ^3.1.1
  cryptography: ^2.7.0

dev_dependencies:
  flutter_test:
    sdk: flutter

flutter:
  uses-material-design: true
