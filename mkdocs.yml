site_name: Hydra Mobile SDK
site_description: Flutter-friendly Dart client for Cardano Hydra (hydra-node 2.x) — Android & iOS.
site_url: https://dextrlabs-dev.github.io/hydra-mobile-sdk/
repo_url: https://github.com/dextrlabs-dev/hydra-mobile-sdk
repo_name: dextrlabs-dev/hydra-mobile-sdk
edit_uri: edit/main/docs/

docs_dir: docs

not_in_nav: |
  SLIDES.md

theme:
  name: material
  features:
    - navigation.sections
    - navigation.top
    - navigation.indexes
    - content.code.copy
    - content.code.annotate
    - search.highlight
  palette:
    - scheme: default
      primary: teal
      accent: deep orange
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
    - scheme: slate
      primary: teal
      accent: deep orange
      toggle:
        icon: material/brightness-4
        name: Switch to light mode

markdown_extensions:
  - admonition
  - attr_list
  - md_in_html
  - tables
  - toc:
      permalink: true
  - pymdownx.details
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.inlinehilite
  - pymdownx.snippets
  - pymdownx.superfences
  - pymdownx.tabbed:
      alternate_style: true

nav:
  - Home: index.md
  - Using the SDK:
      - API Cheat Sheet: API_CHEATSHEET.md
      - API Mapping: API_MAPPING.md
      - Integration Code Map: INTEGRATION_LINKS.md
  - Evidence & Demos:
      - Performance Review: PERFORMANCE.md
      - On-chain Evidence: onchain-evidence.md
      - External POCs: POCS.md
      - Developer Workshop: WORKSHOP_SCRIPT.md
  - PDF Compliance: PDF_COMPLIANCE.md
